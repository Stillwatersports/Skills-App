<!-- SW INTRO — loaded dynamically by index.html. Do not open directly. -->
<style>
/* scroll lock while intro shows */
body.sw-active{overflow:hidden!important}

/* ── OVERLAY STRUCTURE ── */
#sw-intro{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

/* ── BACKGROUND PHOTO with Ken Burns ── */
#sw-bg{
  position:absolute;inset:-8%;
  background:url("./4.png") center/cover no-repeat;
  opacity:0;
  animation:
    bgFadeIn  2s ease 0.3s forwards,
    kenBurns 14s ease-in-out 0.3s forwards;
}
@keyframes bgFadeIn{
  from{opacity:0} to{opacity:1}
}
@keyframes kenBurns{
  from{transform:scale(1.15) translateY(2%)}
  to{transform:scale(1) translateY(0%)}
}

/* Dark cinematic vignette */
#sw-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,
    rgba(0,0,0,0) 30%,
    rgba(0,0,0,0.55) 100%);
  pointer-events:none;
}

/* Dark tint layer */
#sw-tint{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.38);
  pointer-events:none;
}

/* ── LOGO CANVAS — all elements absolutely positioned ── */
#sw-logo{
  position:relative;
  width:min(780px,90vw);
  aspect-ratio:1563/938;
  opacity:0;
  animation:logoGroupIn 0.01s 0.5s forwards;
}
@keyframes logoGroupIn{to{opacity:1}}

#sw-logo img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:fill;
  opacity:0;
}

/* ── ELEMENT ANIMATIONS ── */

/* S swoosh: zooms in from huge+blurry, snaps sharp */
#el-s{
  animation:
    elS_zoom 1.4s cubic-bezier(.16,1,.3,1) 1.2s forwards;
  filter:drop-shadow(0 0 0px rgba(255,220,0,0));
}
@keyframes elS_zoom{
  0%  {opacity:0;transform:scale(3.5);filter:blur(18px) drop-shadow(0 0 0px rgba(255,220,0,0))}
  40% {opacity:1;filter:blur(0) drop-shadow(0 0 40px rgba(255,220,80,.6))}
  100%{opacity:1;transform:scale(1);filter:drop-shadow(0 0 18px rgba(255,220,80,.3))}
}

/* tillwater: slides up and fades in after S lands */
#el-till{
  animation: elTill_in 1s cubic-bezier(.16,1,.3,1) 2.4s forwards;
  filter:drop-shadow(0 0 12px rgba(255,220,80,.2));
}
@keyframes elTill_in{
  0%  {opacity:0;transform:translateY(30px);filter:blur(8px)}
  100%{opacity:1;transform:translateY(0);filter:drop-shadow(0 0 12px rgba(255,220,80,.2))}
}

/* SPORTS: rockets in from right */
#el-sports{
  animation: elSports_in 1s cubic-bezier(.16,1,.3,1) 3.1s forwards;
  filter:drop-shadow(0 0 16px rgba(224,64,160,.3));
}
@keyframes elSports_in{
  0%  {opacity:0;transform:translateX(60px) scale(1.1);filter:blur(6px)}
  100%{opacity:1;transform:translateX(0) scale(1);filter:drop-shadow(0 0 16px rgba(224,64,160,.3))}
}

/* Full logo assembled — neon pulse */
#sw-logo.assembled #el-s,
#sw-logo.assembled #el-till,
#sw-logo.assembled #el-sports{
  animation-play-state:running;
}

/* ── TAGLINE ── */
#sw-tag{
  position:absolute;
  bottom:18%;
  left:50%;transform:translateX(-50%);
  font-size:clamp(11px,1.5vw,14px);
  font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,254,180,.7);
  white-space:nowrap;
  opacity:0;
  animation:tagIn 1.2s ease 4.2s forwards;
  text-shadow:0 1px 8px rgba(0,0,0,.8);
}
@keyframes tagIn{
  from{opacity:0;transform:translateX(-50%) translateY(10px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* ── BADGE ── */
#sw-badge{
  position:absolute;
  top:22%;
  left:50%;transform:translateX(-50%);
  background:#E040A0;color:#FFFeb4;
  font-size:clamp(10px,1.3vw,13px);font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  padding:7px 24px;border-radius:50px;
  white-space:nowrap;
  opacity:0;
  animation:tagIn 1s ease 4.8s forwards;
}

/* ── CTA ── */
#sw-cta{
  position:absolute;
  bottom:8%;
  left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  opacity:0;
  animation:tagIn 1s ease 5.4s forwards;
}
#sw-cta button{
  background:#E040A0;color:#FFFeb4;
  font-size:clamp(13px,1.6vw,16px);font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  padding:16px 48px;border-radius:50px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;
  transition:transform .15s,box-shadow .2s;
  white-space:nowrap;
}
#sw-cta button:hover{transform:scale(1.05);box-shadow:0 0 0 6px rgba(224,64,160,.3)}
#sw-cta span{
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,254,180,.35);cursor:pointer;
  transition:color .2s;
}
#sw-cta span:hover{color:rgba(255,254,180,.7)}



/* ── COORDS ── */
#sw-coords{
  position:absolute;top:5%;left:4%;
  font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(255,254,180,.35);line-height:1.8;
  opacity:0;animation:tagIn 1.5s ease 3s forwards;
}

/* ── EXIT CURTAIN ── */
#sw-curtain{
  position:fixed;inset:0;background:#000;z-index:10000;
  pointer-events:none;opacity:0;transition:opacity .7s ease;
}
</style>

<div id="sw-curtain"></div>

<div id="sw-intro" onclick="swEnter()">

  <div id="sw-bg"></div>
  <div id="sw-tint"></div>
  <div id="sw-vignette"></div>

  <div id="sw-coords">N 45°<br>OTTAWA ON</div>
  <div id="sw-badge">Now Booking · Summer 2026</div>

  <div id="sw-logo">
    <img id="el-s"      src="./3.png"      alt="S"/>
    <img id="el-till"   src="./5.png"   alt="tillwater"/>
    <img id="el-sports" src="./2.png" alt="SPORTS"/>
  </div>

  <div id="sw-tag">Ottawa · Muskoka · Kawarthas · Prince Edward County · and beyond</div>

  <div id="sw-cta">
    <button onclick="swEnter()">Get On The Water →</button>
    <span onclick="swEnter()">tap anywhere to skip</span>
  </div>



</div>

<script>
(function(){
  // Patch swEnter to unlock scroll and remove active class
  function swEnter(){
  var c=document.getElementById('sw-curtain');
  var iv=document.getElementById('sw-intro');
  c.style.opacity='1';
  c.style.pointerEvents='all';
  iv.style.transition='opacity .5s ease';
  iv.style.opacity='0';
  setTimeout(function(){
    iv.style.display='none';
    c.style.display='none';
    document.body.style.overflow='auto';
  },700);
}

// Session — only show once
if(sessionStorage.getItem('sw-seen')){
  swEnter();
} else {
  sessionStorage.setItem('sw-seen','1');
  // Auto-dismiss after 12s
  window._swTimer=setTimeout(swEnter,12000);
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'||e.key===' '||e.key==='Enter') swEnter();
  });
}
  var _base = swEnter;
  swEnter = function(){
    document.body.classList.remove('sw-active');
    _base();
  };
  // Lock scroll only when intro will actually show
  if(!sessionStorage.getItem('sw-seen')){
    document.body.classList.add('sw-active');
  }
})();
</script>
