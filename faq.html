<script>
function toggleFaq(btn){
  const answer = btn.nextElementSibling;
  const isOpen = btn.classList.contains('open');
  document.querySelectorAll('.faq-q').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.faq-a').forEach(a => a.classList.remove('open'));
  if(!isOpen){ btn.classList.add('open'); answer.classList.add('open'); }
}
</script>

<!-- ══ PROMO BANNER ══ -->
<div id="promo-banner" role="alert">
  <span id="promo-banner-text"></span>
  <a id="promo-banner-cta" href="/booking" style="display:none"></a>
  <button id="promo-banner-close" onclick="closeBanner()" aria-label="Close">✕</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  // Banner reads from Supabase promo_config (admin-editable).
  // Falls back to window.PROMO_CONFIG in content.js if Supabase is down.
  var SUPABASE_URL = 'https://isbhflfmugfeqwhhqlkh.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYmhmbGZtdWdmZXF3aGhxbGtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MDE0MzEsImV4cCI6MjA5MzA3NzQzMX0.TKMd_rSmJvoLiL5_1pFw9KqYHNne-eEdnGNR4zgZwFk';
  var done = false;

  function render(cfg){
    if(done) return;
    done = true;
    if(!cfg || !cfg.active) return;
    var id = cfg.promo_id || cfg.id || 'promo';
    if(sessionStorage.getItem('promo-dismissed-'+id)) return;
    var t = document.getElementById('promo-banner-text');
    var b = document.getElementById('promo-banner');
    if(!t || !b) return;
    t.textContent = cfg.text || '';
    if(cfg.cta_text && cfg.cta_url){
      var a = document.getElementById('promo-banner-cta');
      a.textContent = cfg.cta_text;
      a.href = cfg.cta_url;
      a.style.display = 'inline';
    }
    window._promoActiveId = id;
    setTimeout(function(){ b.classList.add('visible'); }, 800);
  }

  function fallback(){ render(window.PROMO_CONFIG); }

  // Wait briefly for Supabase library to be ready
  function tryFetch(){
    if(typeof supabase === 'undefined'){ fallback(); return; }
    try {
      var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      db.from('promo_config').select('*').eq('id',1).single().then(function(r){
        if(r && r.data && !r.error){
          render({
            promo_id: r.data.promo_id,
            active:   r.data.active,
            text:     r.data.text,
            cta_text: r.data.cta_text,
            cta_url:  r.data.cta_url
          });
        } else { fallback(); }
      }).catch(fallback);
    } catch(e){ fallback(); }
  }

  // Supabase script loads sync above this block, so it should be ready.
  // But cover edge cases with a tiny defer.
  if(typeof supabase !== 'undefined'){ tryFetch(); }
  else { setTimeout(tryFetch, 50); }
})();

function closeBanner(){
  sessionStorage.setItem('promo-dismissed-'+(window._promoActiveId||'promo'), '1');
  var b = document.getElementById('promo-banner');
  if(b) b.classList.remove('visible');
}
</script>
<!-- ══ /PROMO BANNER ══ -->
