<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cyan:#00C8D4;--pink:#E040A0;--yellow:#FFFeb4;--offwhite:#FFFFF0;
  --dark:#1a2a2a;--muted:#3a6a6a;--hint:#7aacac;--dark-band:#0a2828;
  --border:#e0dfc0;
}
body{font-family:'Outfit',sans-serif;background:var(--yellow);color:var(--dark);min-height:100vh}

/* ── LOADING ── */
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark)}
.spinner{width:44px;height:44px;border:4px solid rgba(0,200,212,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CARD ── */
#card{display:none;max-width:480px;margin:0 auto;background:var(--yellow)}
#card.visible{display:block;animation:fadeUp .35s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
#card-hero{position:relative;width:100%;padding-bottom:60%;overflow:hidden}
#hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
#hero-overlay{position:absolute;inset:0}
#hero-text{position:absolute;bottom:20px;left:20px;right:20px}
#hero-eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.16em;
  color:var(--pink);text-transform:uppercase;margin-bottom:4px;
}

/* CARD BODY */
#card-body{padding:20px 20px 0}
#card-name{
  font-size:34px;font-weight:900;color:var(--pink);
  line-height:1.1;margin-bottom:16px;
}

/* PROMO BUTTON — shown above the 3 CTAs */
#promo-btn-wrap{margin-bottom:10px;display:none}
#btn-promo{
  width:100%;padding:16px;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;
  border:none;border-radius:50px;cursor:pointer;letter-spacing:.04em;
  transition:filter .15s;
}
#btn-promo:hover{filter:brightness(0.9)}

/* 3 CTA BUTTONS */
.cta-buttons{display:flex;gap:8px;margin-bottom:14px}
.btn-cta-item{
  flex:1;padding:13px 6px;
  font-family:'Outfit',sans-serif;font-size:13px;
  font-weight:800;border:none;border-radius:50px;
  cursor:pointer;letter-spacing:.02em;transition:filter .15s;
  text-decoration:none;text-align:center;
  display:flex;align-items:center;justify-content:center;line-height:1.2;
}
.btn-cta-item:hover{filter:brightness(0.9)}

/* BLOCKS */
.block-website{margin-bottom:20px}
.website-img{width:100%;border-radius:12px;display:block;object-fit:cover;cursor:pointer;transition:opacity .15s}
.website-img:hover{opacity:.92}
.website-caption{font-size:14px;font-weight:700;color:var(--pink);text-align:center;margin-top:8px}

.block-credentials{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.cred-pill{
  display:inline-flex;align-items:center;
  padding:6px 14px;border:1.5px solid var(--cyan);
  border-radius:20px;font-size:12px;font-weight:700;color:var(--muted);
}

.block-description{margin-bottom:20px}
.tagline{font-size:17px;font-weight:800;color:var(--dark);margin-bottom:10px;line-height:1.3}
.desc-lines{margin-bottom:12px}
.desc-line{font-size:15px;color:var(--dark);margin-bottom:4px;line-height:1.65}
.cta-text{font-size:16px;font-weight:800;color:var(--pink);line-height:1.3}

.block-numbers{display:flex;gap:10px;margin-bottom:20px}
.num-card{flex:1;background:rgba(0,200,212,.1);border-radius:12px;padding:14px 8px;text-align:center}
.num-val{font-size:20px;font-weight:900;color:var(--dark)}
.num-cap{font-size:11px;font-weight:600;color:var(--muted);margin-top:3px}

.section-label{
  font-size:11px;font-weight:700;letter-spacing:.12em;
  color:var(--muted);text-transform:uppercase;margin-bottom:12px;
}

.block-portfolio{margin-bottom:20px}
.portfolio-scroll{
  display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.portfolio-scroll::-webkit-scrollbar{display:none}
.portfolio-item{flex:0 0 140px;border-radius:10px;overflow:hidden;cursor:pointer}
.portfolio-item img{width:140px;height:100px;object-fit:cover;display:block}
.portfolio-caption{font-size:11px;color:var(--muted);padding:4px 2px;font-weight:600}

.block-video{margin-bottom:20px}
.video-wrapper{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px}
.video-wrapper iframe,.video-wrapper video{position:absolute;inset:0;width:100%;height:100%}
.video-caption{font-size:13px;color:var(--muted);margin-top:8px;text-align:center}

.block-contact{margin-bottom:20px}
.contact-line{
  display:flex;align-items:center;gap:12px;
  font-size:14px;color:var(--dark);text-decoration:none;
  padding:8px 0;border-bottom:1px solid rgba(58,106,106,.12);
}
.contact-line:last-child{border-bottom:none}
.contact-icon{width:18px;height:18px;color:var(--muted);flex-shrink:0;display:flex;align-items:center}
.contact-icon svg{width:18px;height:18px}

.block-socials{margin-bottom:20px}
.socials-row{display:flex;gap:12px;flex-wrap:wrap}
.social-btn{
  display:flex;align-items:center;justify-content:center;
  width:48px;height:48px;border-radius:50%;
  background:rgba(0,200,212,.12);color:var(--muted);
  text-decoration:none;transition:background .15s;
}
.social-btn:hover{background:rgba(0,200,212,.28)}
.social-btn svg{width:22px;height:22px}

/* FOOTER */
#card-footer{
  background:var(--dark-band);color:var(--cyan);
  text-align:center;padding:22px 20px;
  font-size:13px;font-weight:600;margin-top:20px;
  line-height:1.6;
}

/* ── EXCHANGE MODAL ── */
#exchange-modal{
  display:none;
  position:fixed;inset:0;z-index:1000;
  align-items:flex-end;justify-content:center;
}
#exchange-modal.open{display:flex}
#modal-backdrop{
  position:absolute;inset:0;
  background:rgba(10,40,40,.55);
  backdrop-filter:blur(4px);
}
#modal-sheet{
  position:relative;z-index:1;
  width:100%;max-width:480px;
  background:var(--offwhite);
  border-radius:24px 24px 0 0;
  padding:28px 24px 32px;
  box-shadow:0 -20px 60px rgba(10,40,40,.3);
  animation:slideUp .28s ease forwards;
  max-height:92dvh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal-drag-handle{
  width:40px;height:4px;border-radius:2px;
  background:var(--border);margin:0 auto 20px;
}
#modal-close{
  position:absolute;top:16px;right:16px;
  background:none;border:none;color:var(--hint);
  font-size:17px;width:28px;height:28px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:color .15s,background .15s;
}
#modal-close:hover{color:var(--muted);background:rgba(58,106,106,.08)}

#modal-eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.14em;
  color:var(--muted);text-transform:uppercase;
  text-align:center;margin-bottom:8px;
}
#modal-headline{
  font-size:26px;font-weight:900;color:var(--dark);
  text-align:center;margin-bottom:6px;line-height:1.1;
}
#modal-description{
  font-size:14px;color:var(--muted);
  text-align:center;margin-bottom:20px;
}

.field-group{margin-bottom:14px}
.field-group label{
  display:block;font-size:10px;font-weight:700;
  letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;margin-bottom:5px;line-height:1.4;
}
.field-group input{
  width:100%;padding:13px 15px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;font-family:'Outfit',sans-serif;
  background:#fff;color:var(--dark);outline:none;
  transition:border-color .15s;
}
.field-group input:focus{border-color:var(--cyan)}
.phone-row{
  display:flex;align-items:stretch;
  border:1.5px solid var(--border);border-radius:10px;
  overflow:hidden;background:#fff;transition:border-color .15s;
}
.phone-row:focus-within{border-color:var(--cyan)}
.flag-prefix{
  padding:0 12px;font-size:14px;font-weight:600;
  color:var(--muted);border-right:1px solid var(--border);
  background:#f8f8f0;display:flex;align-items:center;
  white-space:nowrap;flex-shrink:0;
}
.phone-row input{
  border:none;flex:1;padding:13px 12px;
  font-size:15px;font-family:'Outfit',sans-serif;
  outline:none;background:#fff;color:var(--dark);min-width:0;
}
#btn-exchange-submit{
  width:100%;padding:16px;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;
  border:none;border-radius:50px;cursor:pointer;letter-spacing:.04em;
  margin-top:6px;transition:filter .15s;
  background:var(--pink);color:var(--yellow);
}
#btn-exchange-submit:hover{filter:brightness(0.9)}
#btn-exchange-submit:disabled{opacity:.6;cursor:wait}
#modal-error{
  color:#c0392b;font-size:12px;font-weight:600;
  text-align:center;margin-top:8px;display:none;
}
.privacy-note{
  font-size:11px;color:var(--hint);
  text-align:center;margin-top:10px;line-height:1.5;
}
.privacy-note a{color:var(--muted)}

@media(min-width:520px){
  #card{box-shadow:0 0 60px rgba(10,40,40,.15);margin:20px auto;border-radius:24px;overflow:hidden}
  #exchange-modal{align-items:center}
  #modal-sheet{border-radius:24px;max-height:85dvh}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="spinner"></div></div>

<!-- FULL CARD — shown immediately on scan -->
<div id="card">
  <div id="card-hero">
    <img id="hero-img" src="/assets/card-hero.png" alt="Stillwater Sports"/>
    <div id="hero-overlay"></div>
    <div id="hero-text">
      <div id="hero-eyebrow">HEAD COACH</div>
    </div>
  </div>
  <div id="card-body">
    <h1 id="card-name">Christian Richards</h1>

    <!-- PROMO BUTTON (e.g. "Get 15% Off") — above the 3 CTAs -->
    <div id="promo-btn-wrap">
      <button id="btn-promo" onclick="openExchangeModal('promo')">Get 15% Off 🎉</button>
    </div>

    <!-- 3 CONTACT BUTTONS -->
    <div class="cta-buttons">
      <button id="btn-save" class="btn-cta-item" onclick="downloadVCard()">Save Contact</button>
      <a id="btn-sms" class="btn-cta-item" href="#">Send Us a Text</a>
      <a id="btn-dm" class="btn-cta-item" href="#" target="_blank" rel="noopener">DM Us</a>
    </div>

    <div id="card-credentials"></div>
    <div id="card-blocks"></div>
  </div>
  <footer id="card-footer"></footer>
</div>

<!-- EXCHANGE MODAL -->
<div id="exchange-modal" role="dialog" aria-modal="true" aria-labelledby="modal-headline">
  <div id="modal-backdrop" onclick="closeExchangeModal()"></div>
  <div id="modal-sheet">
    <div id="modal-drag-handle"></div>
    <button id="modal-close" onclick="closeExchangeModal()" aria-label="Close">✕</button>
    <div id="modal-eyebrow">LET'S CONNECT</div>
    <h2 id="modal-headline">LEARN MORE</h2>
    <p id="modal-description">Your info for mine. Quick.</p>
    <form id="exchange-form" onsubmit="submitExchange(event)" novalidate>
      <div class="field-group">
        <label for="f-name">NAME</label>
        <input type="text" id="f-name" placeholder="Your name" autocomplete="name"/>
      </div>
      <div class="field-group">
        <label for="f-phone">PHONE</label>
        <div class="phone-row">
          <span class="flag-prefix">🇨🇦 +1</span>
          <input type="tel" id="f-phone" placeholder="613 555 0123" autocomplete="tel-national"/>
        </div>
      </div>
      <div class="field-group">
        <label for="f-email">EMAIL <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="email" id="f-email" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="field-group">
        <label for="f-source" id="f-source-label">WHERE DID YOU HEAR ABOUT US? (OPTIONAL)</label>
        <input type="text" id="f-source" placeholder="e.g. Facebook, a friend, the dock…" autocomplete="off"/>
      </div>
      <!-- Hidden: promo from QR code — tracked server-side, never shown to user -->
      <input type="hidden" id="f-promo-hidden"/>
      <div id="modal-error">Please enter your name and phone number.</div>
      <button type="submit" id="btn-exchange-submit">COMPLETE EXCHANGE →</button>
      <p class="privacy-note">By exchanging you agree to our <a href="/policies">privacy policy</a>.</p>
    </form>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const SUPABASE_URL = 'https://isbhflfmugfeqwhhqlkh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYmhmbGZtdWdmZXF3aGhxbGtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MDE0MzEsImV4cCI6MjA5MzA3NzQzMX0.TKMd_rSmJvoLiL5_1pFw9KqYHNne-eEdnGNR4zgZwFk';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── DEFAULTS ────────────────────────────────────────────────
const DEFAULT_CFG = {
  hero_image_url:'/assets/card-hero.png',
  eyebrow_text:'HEAD COACH',
  display_name:'Christian Richards',
  credentials:['Certified Coach','Insured','1000+ new riders'],
  tagline:'WaterSki · WakeBoard · WakeSurf & More!',
  description_lines:['All ages and skill levels','All Inclusive','Skis, Boards, Ropes, Life Jackets, Boat, Gas'],
  cta_text:'All you need is you and your crew!',
  key_numbers:[{number:'1000+',caption:'New Riders'},{number:'100%',caption:'Gear Included'},{number:'15+',caption:'Years Teaching'}],
  portfolio_title:'Portfolio',portfolio_items:[],
  contact_phone:'+1 613 299 5998',contact_email:'christian@learnwatersports.ca',contact_website:'https://learnwatersports.ca',
  socials:[
    {platform:'instagram',url:'https://www.instagram.com/stillwater.sports/',label:'Instagram'},
    {platform:'facebook',url:'https://www.facebook.com/profile.php?id=61590102153193',label:'Facebook'}
  ],
  intro_video_url:null,intro_video_caption:null,
  footer_text:'1000+ new riders · Everyone gets up – guaranteed!',
  block_order:[
    {block_id:'description',enabled:true,order:1},
    {block_id:'key_numbers',enabled:true,order:2},
    {block_id:'website',enabled:true,order:3},
    {block_id:'intro_video',enabled:false,order:4},
    {block_id:'contact_info',enabled:true,order:5},
    {block_id:'socials',enabled:true,order:6}
  ],

  // ── EXCHANGE MODAL COPY ──
  exchange_headline:"LET'S CONNECT",
  exchange_subheadline:'LEARN MORE',
  exchange_description:'Your info for mine. Quick.',
  exchange_source_field_label:'WHERE DID YOU HEAR ABOUT US? (OPTIONAL)',
  exchange_cta_text:'COMPLETE EXCHANGE →',

  // ── PROMO BUTTON (above exchange + CTAs) ──
  promo_btn_enabled:true,
  promo_btn_text:'Get 15% Off 🎉',
  promo_btn_bg:'#E040A0',
  promo_btn_color:'#FFFEB4',
  promo_btn_radius:'50px',
  promo_btn_font_size:'15px',
  promo_btn_font_weight:'800',

  // ── MODAL SUBMIT BUTTON ──
  exchange_submit_bg:'#E040A0',
  exchange_submit_color:'#FFFEB4',

  // ── 3 CONTACT CTA BUTTONS (individual overrides; null = use shared default) ──
  cta_btn_bg:'#00C8D4',
  cta_btn_color:'#FFFEB4',
  cta_btn_radius:'50px',
  cta_btn_font_size:'13px',
  cta_btn_font_weight:'800',

  cta_save_text:'Save Contact',
  cta_save_bg:null,
  cta_save_color:null,

  cta_button_text:'Send Us a Text',
  cta_sms_bg:null,
  cta_sms_color:null,
  cta_button_sms_body:'Hi christian i saw your flyer for stillwater sports and wanted to know more!',

  cta_dm_text:'DM Us',
  cta_dm_bg:null,
  cta_dm_color:null,
  cta_dm_url:'https://www.instagram.com/stillwater.sports/',

  // ── VCARD ──
  vcard_org:'Stillwater Sports',vcard_title:'Head Coach',
  vcard_url:'https://learnwatersports.ca',
  vcard_note:'Premium private waterski, wakeboard & wakesurf coaching. Ottawa Valley & cottage country.',

  // ── WEBSITE BLOCK ──
  website_image_url:'/assets/FB-main.jpg',
  website_caption:'tap to visit our website',
  website_link_url:'https://learnwatersports.ca',

  hero_overlay_gradient:'linear-gradient(180deg, rgba(10,40,40,0.3) 0%, rgba(10,40,40,0.7) 100%)'
};

// ── STATE ──────────────────────────────────────────────────
let cfg = null;
let scanId = null;
let qrPromoCode = null;   // hidden — from QR, never shown to user

// ── INIT: go straight to card ──────────────────────────────
(async () => {
  const params = new URLSearchParams(window.location.search);
  const srcSlug = params.get('src') || params.get('q') || '';

  // Load card config
  try {
    const { data } = await db.from('card_config').select('*').limit(1).single();
    cfg = data || DEFAULT_CFG;
  } catch(e) {
    cfg = DEFAULT_CFG;
  }

  // Look up QR code & capture promo silently
  if (srcSlug) {
    try {
      const { data: qr } = await db.from('qr_codes')
        .select('id,name,promo_code').eq('slug', srcSlug).eq('active', true).single();
      if (qr) {
        qrPromoCode = qr.promo_code || null;
        // Store in hidden field for form submission — never shown to user
        if (qrPromoCode) {
          document.getElementById('f-promo-hidden').value = qrPromoCode;
        }
      }
    } catch(e) { console.warn('QR lookup failed', e); }

    // Log scan
    try {
      const { data: scan } = await db.from('card_scans').insert({
        qr_code_id: null, // resolved below if qr found
        source_slug: srcSlug,
        converted: false,
        user_agent: navigator.userAgent.substring(0,500),
        referrer: document.referrer || null
      }).select('id').single();
      if (scan) scanId = scan.id;
    } catch(e) { console.warn('Scan log failed', e); }
  }

  // Show card immediately — no gate
  renderCard();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('card').classList.add('visible');
})();

// ── RENDER CARD ────────────────────────────────────────────
function renderCard() {
  const c = cfg || DEFAULT_CFG;

  // Hero
  document.getElementById('hero-img').src = c.hero_image_url || '/assets/card-hero.png';
  document.getElementById('hero-overlay').style.background =
    c.hero_overlay_gradient || 'linear-gradient(180deg,rgba(10,40,40,.3) 0%,rgba(10,40,40,.7) 100%)';
  document.getElementById('hero-eyebrow').textContent = c.eyebrow_text || 'HEAD COACH';
  document.getElementById('card-name').textContent = c.display_name || 'Christian Richards';

  // ── PROMO BUTTON ──
  const promoBtnWrap = document.getElementById('promo-btn-wrap');
  const promoBtn = document.getElementById('btn-promo');
  const promoEnabled = c.promo_btn_enabled !== false;
  if (promoEnabled) {
    promoBtn.textContent = c.promo_btn_text || 'Get 15% Off 🎉';
    promoBtn.style.cssText = `
      background:${c.promo_btn_bg||'#E040A0'};
      color:${c.promo_btn_color||'#FFFEB4'};
      border-radius:${c.promo_btn_radius||'50px'};
      font-size:${c.promo_btn_font_size||'15px'};
      font-weight:${c.promo_btn_font_weight||'800'};
    `;
    promoBtnWrap.style.display = 'block';
  } else {
    promoBtnWrap.style.display = 'none';
  }

  // ── 3 CONTACT BUTTONS ──
  const sharedBg    = c.cta_btn_bg    || '#00C8D4';
  const sharedColor = c.cta_btn_color || '#FFFEB4';
  const sharedR     = c.cta_btn_radius || '50px';
  const sharedFS    = c.cta_btn_font_size || '13px';
  const sharedFW    = c.cta_btn_font_weight || '800';

  function applyCtaStyle(el, bgOverride, colorOverride) {
    el.style.background   = bgOverride || sharedBg;
    el.style.color        = colorOverride || sharedColor;
    el.style.borderRadius = sharedR;
    el.style.fontSize     = sharedFS;
    el.style.fontWeight   = sharedFW;
  }

  const btnSave = document.getElementById('btn-save');
  btnSave.textContent = c.cta_save_text || 'Save Contact';
  applyCtaStyle(btnSave, c.cta_save_bg, c.cta_save_color);

  const btnSms = document.getElementById('btn-sms');
  btnSms.textContent = c.cta_button_text || 'Send Us a Text';
  applyCtaStyle(btnSms, c.cta_sms_bg, c.cta_sms_color);
  const ctaPhone = (c.contact_phone || '+16132995998').replace(/\s/g,'');
  const ctaBody = encodeURIComponent(c.cta_button_sms_body || 'Hi christian i saw your flyer for stillwater sports and wanted to know more!');
  btnSms.href = 'sms:' + ctaPhone + '?body=' + ctaBody;

  const btnDm = document.getElementById('btn-dm');
  btnDm.textContent = c.cta_dm_text || 'DM Us';
  applyCtaStyle(btnDm, c.cta_dm_bg, c.cta_dm_color);
  btnDm.href = c.cta_dm_url || 'https://www.instagram.com/stillwater.sports/';

  // ── MODAL SUBMIT BUTTON ──
  const submitBtn = document.getElementById('btn-exchange-submit');
  submitBtn.style.background = c.exchange_submit_bg || '#E040A0';
  submitBtn.style.color      = c.exchange_submit_color || '#FFFEB4';

  // ── CREDENTIALS ──
  const creds = c.credentials || [];
  document.getElementById('card-credentials').innerHTML = creds.length
    ? `<div class="block-credentials">${creds.map(x=>`<span class="cred-pill">${esc(x)}</span>`).join('')}</div>`
    : '';

  // ── BLOCKS ──
  const blockOrder = c.block_order || DEFAULT_CFG.block_order;
  const sorted = [...blockOrder].filter(b => b.enabled).sort((a,b) => a.order - b.order);
  document.getElementById('card-blocks').innerHTML = sorted.map(b => renderBlock(b.block_id)).join('');

  // ── FOOTER ──
  document.getElementById('card-footer').textContent = c.footer_text || '1000+ new riders · Everyone gets up – guaranteed!';

  // ── MODAL COPY ──
  document.getElementById('modal-eyebrow').textContent    = c.exchange_headline   || "LET'S CONNECT";
  document.getElementById('modal-headline').textContent   = c.exchange_subheadline|| 'LEARN MORE';
  document.getElementById('modal-description').textContent= c.exchange_description|| 'Your info for mine. Quick.';
  document.getElementById('f-source-label').textContent   = c.exchange_source_field_label || 'WHERE DID YOU HEAR ABOUT US? (OPTIONAL)';
  submitBtn.textContent = c.exchange_cta_text || 'COMPLETE EXCHANGE →';
}

// ── EXCHANGE MODAL ─────────────────────────────────────────
function openExchangeModal(trigger) {
  // If opened via promo button, optionally customise modal headline
  const c = cfg || DEFAULT_CFG;
  if (trigger === 'promo' && c.promo_btn_text) {
    document.getElementById('modal-description').textContent =
      `Share your info to claim your discount.`;
  } else {
    document.getElementById('modal-description').textContent =
      c.exchange_description || 'Your info for mine. Quick.';
  }
  document.getElementById('exchange-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('f-name').focus();
}

function closeExchangeModal() {
  document.getElementById('exchange-modal').classList.remove('open');
  document.body.style.overflow = '';
}

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeExchangeModal();
});

// ── SUBMIT EXCHANGE ────────────────────────────────────────
async function submitExchange(e) {
  e.preventDefault();
  const name     = document.getElementById('f-name').value.trim();
  const email    = document.getElementById('f-email').value.trim();
  const rawPhone = document.getElementById('f-phone').value.replace(/\D/g,'');
  const source   = document.getElementById('f-source').value.trim();   // visible "heard about us"
  const promoHidden = document.getElementById('f-promo-hidden').value; // hidden QR promo
  const errEl    = document.getElementById('modal-error');

  if (!name || !rawPhone) {
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const btn = document.getElementById('btn-exchange-submit');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const params = new URLSearchParams(window.location.search);
  const srcSlug = params.get('src') || params.get('q') || '';
  const phone = '+1' + rawPhone;

  try {
    const { data: contact } = await db.from('card_contacts').insert({
      name,
      email: email || null,
      phone,
      promo_code:  promoHidden || null,   // QR tracking code — hidden from user
      source_slug: srcSlug || null,
      source_name: source || null,        // what user typed in "heard about us"
      user_agent:  navigator.userAgent.substring(0,500)
    }).select('id').single();

    if (contact && scanId) {
      await db.from('card_scans').update({ converted:true, contact_id:contact.id }).eq('id', scanId);
    }
  } catch(err) {
    console.warn('Exchange save failed:', err);
  }

  closeExchangeModal();
  // Brief confirmation
  btn.textContent = '✓ Got it — thanks!';
  setTimeout(() => {
    const c = cfg || DEFAULT_CFG;
    btn.textContent = c.exchange_cta_text || 'COMPLETE EXCHANGE →';
    btn.disabled = false;
  }, 2500);
}

// ── BLOCK RENDERER ─────────────────────────────────────────
function renderBlock(blockId) {
  const c = cfg || DEFAULT_CFG;
  switch(blockId) {
    case 'credentials': return '';
    case 'portfolio':   return '';
    case 'website': {
      const imgUrl  = c.website_image_url  || '/assets/FB-main.jpg';
      const caption = c.website_caption    || 'tap to visit our website';
      const link    = c.website_link_url   || 'https://learnwatersports.ca';
      return `<div class="block-website">
        <a href="${esc(link)}" target="_blank" rel="noopener">
          <img class="website-img" src="${esc(imgUrl)}" alt="Visit our website" loading="lazy"/>
        </a>
        <div class="website-caption">${esc(caption)}</div>
      </div>`;
    }
    case 'description': {
      const lines = c.description_lines || [];
      return `<div class="block-description">
        <div class="tagline">${esc(c.tagline||'')}</div>
        <div class="desc-lines">${lines.map(l=>`<div class="desc-line">✅ ${esc(l)}</div>`).join('')}</div>
        <div class="cta-text">${esc(c.cta_text||'')}</div>
      </div>`;
    }
    case 'key_numbers': {
      const nums = c.key_numbers || [];
      if (!nums.length) return '';
      return `<div class="block-numbers">${nums.map(n=>`<div class="num-card"><div class="num-val">${esc(n.number)}</div><div class="num-cap">${esc(n.caption)}</div></div>`).join('')}</div>`;
    }
    case 'intro_video': {
      if (!c.intro_video_url) return '';
      const url = c.intro_video_url;
      let embed = '';
      const ytMatch = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]+)/);
      const vmMatch = url.match(/vimeo\.com\/(\d+)/);
      if (ytMatch) embed = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
      else if (vmMatch) embed = `<iframe src="https://player.vimeo.com/video/${vmMatch[1]}" frameborder="0" allowfullscreen></iframe>`;
      else embed = `<video src="${esc(url)}" controls playsinline></video>`;
      return `<div class="block-video"><div class="video-wrapper">${embed}</div>${c.intro_video_caption?`<div class="video-caption">${esc(c.intro_video_caption)}</div>`:''}</div>`;
    }
    case 'contact_info': {
      const phone   = c.contact_phone   || '';
      const email   = c.contact_email   || '';
      const website = c.contact_website || '';
      return `<div class="block-contact">
        <div class="section-label">CONTACT INFORMATION</div>
        ${phone?`<a href="tel:${phone.replace(/\s/g,'')}" class="contact-line"><span class="contact-icon">${icoPhone}</span>${esc(phone)}</a>`:''}
        ${email?`<a href="mailto:${esc(email)}" class="contact-line"><span class="contact-icon">${icoEmail}</span>${esc(email)}</a>`:''}
        ${website?`<a href="${esc(website)}" target="_blank" rel="noopener" class="contact-line"><span class="contact-icon">${icoGlobe}</span>${esc(website.replace('https://',''))}</a>`:''}
      </div>`;
    }
    case 'socials': {
      const socials = c.socials || [];
      if (!socials.length) return '';
      return `<div class="block-socials">
        <div class="section-label">SOCIALS</div>
        <div class="socials-row">${socials.map(s=>`
          <a href="${esc(s.url)}" target="_blank" rel="noopener" class="social-btn" title="${esc(s.label||s.platform)}">
            ${socialIcon(s.platform)}
          </a>`).join('')}
        </div>
      </div>`;
    }
    default: return '';
  }
}

// ── VCARD ──────────────────────────────────────────────────
function downloadVCard() {
  const c = cfg || DEFAULT_CFG;
  const nameParts = (c.display_name || 'Christian Richards').split(' ');
  const last = nameParts.pop() || '';
  const first = nameParts.join(' ');
  const phone = (c.contact_phone || '+16132995998').replace(/\s/g,'');
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `N:${last};${first};;;`,
    `FN:${c.display_name || 'Christian Richards'}`,
    `ORG:${c.vcard_org || 'Stillwater Sports'}`,
    `TITLE:${c.vcard_title || 'Head Coach'}`,
    `TEL;TYPE=CELL:${phone}`,
    `EMAIL:${c.contact_email || 'christian@learnwatersports.ca'}`,
    `URL:${c.vcard_url || 'https://learnwatersports.ca'}`,
    `NOTE:${(c.vcard_note || '').replace(/[,;]/g,m=>'\\'+m)}`,
    'END:VCARD'
  ].join('\r\n');

  const blob = new Blob([vcard], { type:'text/vcard;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `${(c.display_name||'Christian_Richards').replace(/\s+/g,'_')}.vcf`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── HELPERS ────────────────────────────────────────────────
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
