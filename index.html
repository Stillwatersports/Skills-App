<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="google-site-verification" content="jZJF_PSlXvRpWgOyPoRULvIevvxrIJ1vXU6LXuRQSwA"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stillwater Sports Ottawa</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFeb4;--card:#fffff0;--border:rgba(0,180,190,0.22);
  --text:#1a2a2a;--muted:#3a6a6a;--hint:#7aacac;
  --brand:#00C8D4;--accent:#E040A0;
  --radius:12px;--rsm:8px;
  --bronze-bg:#F5C4B3;--bronze-t:#4a1a08;--bronze-bar:#C04A20;--bronze-bd:#8B3010;--bronze-m:#E8836A;
  --silver-bg:#C8C6BC;--silver-t:#222220;--silver-bar:#5F5E5A;--silver-bd:#3a3a38;--silver-m:#A0A09A;
  --gold-bg:#F5D87A;--gold-t:#3a2000;--gold-bar:#9A5E08;--gold-bd:#6a3e04;--gold-m:#E8B020;
  --plat-bg:#e8e8f8;--plat-t:#1a0a3a;--plat-bar:#7B68EE;--plat-bd:#5040CC;--plat-m:#b8b0f0;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
@keyframes plat-fade-in{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes unlock-scale{0%{transform:scale(0.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes star-pop{0%{transform:scale(0) rotate(0deg);opacity:0}60%{transform:scale(1.3) rotate(180deg);opacity:1}100%{transform:scale(1) rotate(360deg);opacity:1}}
@keyframes slide-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes note-in{from{opacity:0;max-height:0}to{opacity:1;max-height:200px}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.auth-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:360px}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:var(--rsm);padding:4px;margin:1.25rem 0}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:none;transition:all .15s}
.auth-tab.active{background:var(--card);color:var(--text);border:0.5px solid var(--border)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
.field textarea{resize:vertical;min-height:60px;line-height:1.5}
.btn-primary{width:100%;padding:10px;background:var(--brand);color:#fff;border:none;border-radius:var(--rsm);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.45;cursor:default}
.auth-msg{font-size:12px;margin-top:10px;text-align:center;min-height:18px}
.auth-msg.err{color:#D85A30}.auth-msg.ok{color:#1D9E75}

#app-screen{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--brand);border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:20}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{height:38px;width:auto;background:#FFFeb4;border-radius:6px;padding:2px 8px;object-fit:contain;display:block}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:none;transition:all .15s;position:relative}
.nav-tab.active{background:var(--accent);color:#fff}
.badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#E24B4A;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-sm{font-size:12px;color:var(--accent);background:#FFFeb4;border:0.5px solid var(--accent);border-radius:6px;padding:5px 10px;cursor:pointer;font-weight:600}
.saving-dot{width:6px;height:6px;border-radius:50%;background:#FFFeb4;display:inline-block;margin-left:2px;opacity:0;transition:opacity .2s;vertical-align:middle}
.saving-dot.show{opacity:1}
.main{max-width:860px;margin:0 auto;padding:1rem}

.sport-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem;scrollbar-width:none}
.sport-scroll::-webkit-scrollbar{display:none}
.sport-pill{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:0.5px solid var(--border);cursor:pointer;background:var(--card);color:var(--muted);white-space:nowrap;transition:all .15s}
.sport-pill:hover{border-color:var(--brand);color:var(--brand)}
.sport-pill.active{background:var(--brand);color:#fff;border-color:transparent}
.sport-pill.locked-sport{opacity:.5}

.stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.stat{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.stat-val{font-size:20px;font-weight:600;color:var(--brand)}

.tiers-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
@media(max-width:520px){.tiers-grid{grid-template-columns:1fr}}
.tier-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tier-head{padding:12px 14px 10px}
.tier-medal{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-bottom:6px}
.tier-name{font-size:14px;font-weight:600;margin-bottom:2px}
.tier-count{font-size:11px;opacity:.75}
.tier-bar-track{height:4px;border-radius:2px;background:rgba(0,0,0,0.08);margin-top:8px}
.tier-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.skill-list{border-top:0.5px solid var(--border)}
.skill-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s;border-bottom:0.5px solid var(--border)}
.skill-row:last-child{border-bottom:none}
.skill-row:hover:not(.locked){background:var(--bg)}
.skill-row.locked{opacity:.4;cursor:default}
.skill-cb{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.skill-cb.done{border-color:transparent}
.skill-cb.pending-cb{border-color:var(--accent);background:rgba(224,64,160,0.1)}
.skill-info{flex:1;min-width:0}
.skill-name{font-size:13px;font-weight:500;line-height:1.3}
.skill-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.skill-status{font-size:10px;margin-top:3px;font-weight:500}
.skill-status.pending{color:var(--accent)}
.skill-status.rejected{color:#D85A30}
.coach-note-bubble{margin-top:6px;padding:6px 10px;background:rgba(0,200,212,0.08);border-left:2px solid var(--brand);border-radius:0 6px 6px 0;font-size:11px;color:var(--muted);line-height:1.5}
.coach-note-bubble strong{color:var(--brand);font-weight:600}
.coaching-key-bubble{margin-top:6px;padding:6px 10px;background:rgba(224,64,160,0.06);border-left:2px solid var(--accent);border-radius:0 6px 6px 0;font-size:11px;color:var(--muted);line-height:1.5}
.coaching-key-bubble strong{color:var(--accent);font-weight:600}

.certs-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:1rem}
.cert{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.cert.earned{border-width:1.5px}
.cert-icon{font-size:22px;margin-bottom:6px}
.cert-label{font-size:12px;font-weight:600;margin-bottom:3px}
.cert-status{font-size:11px;color:var(--muted)}
.cert.locked-cert{opacity:.4}
.plat-card{background:linear-gradient(135deg,#e8e8f8,#f0e8ff);border:1.5px solid var(--plat-bd);border-radius:var(--radius);overflow:hidden;animation:plat-fade-in .8s ease forwards}
.plat-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;background:var(--plat-m);color:var(--plat-t);letter-spacing:.04em}

.quiz-wrap{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;animation:slide-up .4s ease}
.quiz-progress{height:4px;background:var(--border);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.quiz-progress-fill{height:100%;border-radius:2px;background:var(--brand);transition:width .4s}
.quiz-q{font-size:15px;font-weight:600;margin-bottom:1rem;line-height:1.4}
.quiz-options{display:grid;gap:8px;margin-bottom:1.25rem}
.quiz-opt{padding:10px 14px;border-radius:var(--rsm);border:0.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.4}
.quiz-opt:hover{border-color:var(--brand);color:var(--brand)}
.quiz-opt.correct{border-color:#1D9E75;background:rgba(29,158,117,0.1);color:#085041}
.quiz-opt.wrong{border-color:#D85A30;background:rgba(216,90,48,0.1);color:#712B13;animation:shake .3s ease}
.quiz-result{text-align:center;padding:2rem 1rem}
.quiz-score-big{font-size:48px;font-weight:800;margin-bottom:8px}
.quiz-score-big.pass{color:#1D9E75}
.quiz-score-big.fail{color:#D85A30}

.training-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.training-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;cursor:pointer;transition:all .15s}
.training-card:hover{border-color:var(--brand)}
.training-card.completed{border-color:#1D9E75;background:rgba(29,158,117,0.04)}
.training-icon{font-size:28px;margin-bottom:10px}
.training-title{font-size:14px;font-weight:600;margin-bottom:4px}
.training-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.training-status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;display:inline-block}
.training-status.pass{background:rgba(29,158,117,0.12);color:#085041}
.training-status.pending-s{background:rgba(0,200,212,0.12);color:var(--brand)}

.share-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-top:1rem}
.share-preview{background:linear-gradient(135deg,#FFFeb4,#fffff0);border:1.5px solid var(--brand);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.btn-share{flex:1;padding:9px;border-radius:var(--rsm);font-size:13px;font-weight:600;border:none;cursor:pointer;min-width:120px}

.coach-section{margin-bottom:1.5rem}
.section-head{font-size:13px;font-weight:600;margin-bottom:.75rem;color:var(--text)}
.approval-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.note-input{width:100%;padding:7px 10px;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:12px;outline:none;margin-top:6px;font-family:inherit}
.empty-state{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.btn-approve{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:#E1F5EE;color:#085041}
.btn-reject{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:#FAECE7;color:#712B13}

.lb-filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.lb-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--border);cursor:pointer;background:var(--card);color:var(--muted);transition:all .15s}
.lb-pill.active{background:var(--brand);color:#fff;border-color:transparent}
.lb-table{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.lb-row{display:grid;grid-template-columns:36px 1fr auto auto;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-row.header{background:var(--bg);font-size:11px;font-weight:600;color:var(--muted)}
.lb-rank{font-size:13px;font-weight:700;color:var(--muted);text-align:center}
.lb-rank.top{color:var(--brand)}
.lb-name{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.lb-tier-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.lb-score{font-size:13px;font-weight:600;color:var(--muted);text-align:right}

.profile-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.profile-avatar-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:1.25rem}
.profile-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--brand);margin-bottom:10px}
.profile-avatar-ph{width:80px;height:80px;border-radius:50%;background:var(--bg);border:2px solid var(--brand);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--brand);margin-bottom:10px}
.btn-upload{font-size:12px;color:var(--brand);background:none;border:0.5px solid var(--brand);border-radius:6px;padding:5px 12px;cursor:pointer}
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border)}
.profile-row:last-child{border-bottom:none}
.profile-key{font-size:12px;color:var(--muted)}
.profile-val{font-size:13px;font-weight:500}
.club-section{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.club-join-row{display:flex;gap:8px;margin-top:10px}
.club-join-row input{flex:1;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:13px;outline:none;text-transform:uppercase}
.btn-join{padding:8px 16px;border-radius:var(--rsm);font-size:13px;font-weight:600;background:var(--brand);color:#fff;border:none;cursor:pointer}

.admin-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:1rem}
@media(max-width:480px){.admin-grid{grid-template-columns:1fr}}
.admin-stat{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rsm);padding:14px}
.admin-stat-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.admin-stat-val{font-size:24px;font-weight:600;color:var(--brand)}
.user-table{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.user-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:13px}
.user-row:last-child{border-bottom:none}
.user-row.header{background:var(--bg);font-size:11px;font-weight:600;color:var(--muted)}
.role-select{font-size:12px;padding:3px 8px;border-radius:6px;border:0.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer}
.btn-reset{font-size:11px;padding:3px 8px;border-radius:6px;border:0.5px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.btn-reset:hover{color:#D85A30;border-color:#D85A30}
.invite-box{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.invite-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.invite-row input,.invite-row select{padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text);font-size:13px;outline:none}
.invite-row input{flex:1;min-width:160px}

.skills-editor-table{width:100%;border-collapse:collapse;font-size:12px}
.skills-editor-table th{background:var(--bg);padding:8px 10px;text-align:left;font-weight:600;color:var(--muted);border-bottom:0.5px solid var(--border);position:sticky;top:0}
.skills-editor-table td{padding:6px 8px;border-bottom:0.5px solid var(--border);vertical-align:top}
.skills-editor-table tr:hover td{background:rgba(0,200,212,0.04)}
.edit-input{width:100%;padding:4px 8px;border:0.5px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px;outline:none;font-family:inherit}
.edit-input:focus{border-color:var(--brand)}
.edit-textarea{width:100%;padding:4px 8px;border:0.5px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px;outline:none;resize:vertical;min-height:40px;font-family:inherit;line-height:1.4}
.edit-textarea:focus{border-color:var(--brand)}
.btn-save-skill{font-size:11px;padding:3px 10px;border-radius:6px;border:none;background:var(--brand);color:#fff;cursor:pointer;white-space:nowrap}
.btn-save-skill:disabled{opacity:.45;cursor:default}
.saved-flash{font-size:10px;color:#1D9E75;margin-left:4px}

#share-screen{display:none;min-height:100vh;padding:1rem;max-width:480px;margin:0 auto}
.share-page-card{background:var(--card);border:1.5px solid var(--brand);border-radius:var(--radius);padding:1.5rem;animation:slide-up .5s ease}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <img src="https://raw.githubusercontent.com/Stillwatersports/Skills-App/main/Logo.png" style="height:100px;object-fit:contain"/>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign up</button>
    </div>
    <div id="name-field" class="field" style="display:none"><label>Your name</label><input type="text" id="inp-name" placeholder="e.g. Jake"/></div>
    <div class="field"><label>Email</label><input type="email" id="inp-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <div class="field"><label>Password</label><input type="password" id="inp-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">Sign in</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- SHARE -->
<div id="share-screen"></div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <img class="topbar-logo" src="https://raw.githubusercontent.com/Stillwatersports/Skills-App/main/Logo.png"/>
      <span class="saving-dot" id="saving-dot"></span>
      <div class="nav-tabs" id="nav-tabs"></div>
    </div>
    <div class="topbar-right">
      <div id="avatar-top" onclick="setView('profile')" style="cursor:pointer"></div>
      <button class="btn-sm" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<script>
const SUPABASE_URL='https://jjnhsbgmcjqwlmeihwuy.supabase.co'
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqbmhzYmdtY2pxd2xtZWlod3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODkwNDEsImV4cCI6MjA4OTg2NTA0MX0.MOTbufdBqUhB36P1YBL-zo-KKlvJ-LBHwPS70D7DoWU'
const{createClient}=supabase

async function loadDbSkills(){
  const{data}=await db.from('skills').select('*').order('sort_order')
  dbSkills={}
  if(!data||data.length===0){await seedSkills();return}
  data.forEach(r=>{if(!dbSkills[r.sport])dbSkills[r.sport]={};if(!dbSkills[r.sport][r.tier])dbSkills[r.sport][r.tier]=[];dbSkills[r.sport][r.tier].push(r)})
}

async function seedSkills(){
  const rows=[];let order=0
  for(const[sportId,sport] of Object.entries(DEFAULT_SKILLS)){
    for(const tier of [...TIERS,'platinum']){
      const skills=sport[tier]||[]
      skills.forEach(sk=>{rows.push({sport:sportId,tier,skill_name:sk.n,description:sk.d||'',coaching_keys:sk.c||'',sort_order:order++})})
    }
  }
  DRYLAND_SKILLS.forEach((sk,i)=>{rows.push({sport:'dryland',tier:'required',skill_name:sk.n,description:sk.d||'',coaching_keys:sk.c||'',sort_order:i})})
  await db.from('skills').insert(rows)
  await loadDbSkills()
}

function getSkills(sport,tier){return dbSkills[sport]?.[tier]||[]}
function getDrylandSkills(){return dbSkills['dryland']?.['required']||[]}

function sportUnlocked(sportId){
  if(sportId==='slalom')return allApproved('waterski','silver')
  if(sportId==='barefoot')return allApproved('slalom','silver')||allApproved('wakeboard','silver')
  return true
}

function tierUnlocked(sportId,tier){
  if(!sportUnlocked(sportId))return false
  if(!drylandPassed())return false
  if(tier==='bronze')return true
  if(tier==='silver')return allApproved(sportId,'bronze')
  if(tier==='gold')return allApproved(sportId,'silver')
  return false
}

async function checkSharePage(){
  const params=new URLSearchParams(window.location.search)
  const uid=params.get('share')
  if(!uid)return false
  document.getElementById('auth-screen').style.display='none'
  document.getElementById('share-screen').style.display='block'
  const{data:profile}=await db.from('profiles').select('*').eq('id',uid).single()
  const{data:appData}=await db.from('approvals').select('*').eq('rider_id',uid).eq('status','approved')
  const done={}
  if(appData)appData.forEach(r=>{done[`${r.sport}|${r.tier}|${r.skill_index}`]=true})
  const{data:skillData}=await db.from('skills').select('*').order('sort_order')
  const sMap={}
  if(skillData)skillData.forEach(r=>{if(!sMap[r.sport])sMap[r.sport]={};if(!sMap[r.sport][r.tier])sMap[r.sport][r.tier]=[];sMap[r.sport][r.tier].push(r)})
  const rows=Object.keys(DEFAULT_SKILLS).map(id=>{
    const earned=TIERS.filter(t=>(sMap[id]?.[t]||[]).every((_,i)=>done[`${id}|${t}|${i}`])&&(sMap[id]?.[t]||[]).length>0)
    const highest=earned[earned.length-1]
    if(!highest)return''
    const colors={bronze:'#C04A20',silver:'#5F5E5A',gold:'#9A5E08'}
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid rgba(0,180,190,0.15)"><span style="font-size:13px;font-weight:500">${DEFAULT_SKILLS[id].name}</span><span style="padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;background:rgba(0,0,0,0.06);color:${colors[highest]||'#888'}">${highest}</span></div>`
  }).filter(Boolean).join('')
  document.getElementById('share-screen').innerHTML=`<div class="share-page-card" style="margin-top:2rem"><div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem">${avatarHtml(profile?.avatar_url,profile?.name,52)}<div><div style="font-size:18px;font-weight:700">${profile?.name||'Rider'}</div><div style="font-size:12px;color:var(--muted)">Stillwater Sports Ottawa</div></div></div>${rows||'<div style="font-size:13px;color:var(--muted)">No achievements yet.</div>'}<div style="margin-top:1rem;text-align:center;font-size:11px;color:var(--hint)">learnwatersports.ca</div></div>`
  return true
}

let authMode='login'
function switchTab(m){authMode=m;document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='login')||(i===1&&m==='signup')));document.getElementById('name-field').style.display=m==='signup'?'block':'none';document.getElementById('auth-btn').textContent=m==='signup'?'Create account':'Sign in';setMsg('','')}
function setMsg(t,type){const el=document.getElementById('auth-msg');el.textContent=t;el.className='auth-msg'+(type?' '+type:'')}

async function doAuth(){
  const email=document.getElementById('inp-email').value.trim()
  const pass=document.getElementById('inp-pass').value
  const btn=document.getElementById('auth-btn')
  if(!email||!pass)return setMsg('Please fill in all fields','err')
  btn.disabled=true;setMsg('','')
  if(authMode==='signup'){
    const name=document.getElementById('inp-name').value.trim()||'Rider'
    const{data,error}=await db.auth.signUp({email,password:pass})
    if(error){setMsg(error.message,'err');btn.disabled=false;return}
    await db.from('profiles').upsert({id:data.user.id,name})
    setMsg('Account created! Check your email to confirm, then sign in.','ok')
    btn.disabled=false
  } else {
    const{data,error}=await db.auth.signInWithPassword({email,password:pass})
    if(error){setMsg(error.message,'err');btn.disabled=false;return}
    await loadUser(data.user)
  }
}

async function signOut(){
  await db.auth.signOut()
  currentUser=null;userProfile=null;approvals={};skillNotes={};quizResults={};drylandApprovals={}
  document.getElementById('app-screen').style.display='none'
  document.getElementById('auth-screen').style.display='flex'
}

// ── GPS SESSION ───────────────────────────────────────────────────
function startSession(sport){
  if(!navigator.geolocation){alert('GPS not available on this device');return}
  activeSession={sport,id:null}
  sessionPositions=[];sessionRuns=0;sessionDistance=0;sessionTopSpeed=0
  sessionStartTime=Date.now();lastPosition=null;currentSpeed=0;isActiveRun=false
  sessionWatchId=navigator.geolocation.watchPosition(onGPSUpdate,onGPSError,{enableHighAccuracy:true,maximumAge:1000,timeout:5000})
  sessionTimer=setInterval(updateSessionUI,1000)
  db.from('sessions').insert({user_id:currentUser.id,sport,started_at:new Date().toISOString(),runs:0,distance_km:0,duration_seconds:0,top_speed_kmh:0,route:[]}).select().single().then(({data})=>{if(data)activeSession.id=data.id})
  renderSessionView(document.getElementById('main-content'))
}

function onGPSUpdate(pos){
  const{latitude:lat,longitude:lng,speed}=pos.coords
  const speedKmh=speed!=null?speed*3.6:0
  currentSpeed=speedKmh
  if(speedKmh>sessionTopSpeed)sessionTopSpeed=speedKmh
  if(lastPosition){
    const d=haversine(lastPosition.lat,lastPosition.lng,lat,lng)
    sessionDistance+=d
  }
  sessionPositions.push({lat,lng,speed:speedKmh,t:Date.now()})
  lastPosition={lat,lng}
  if(speedKmh>=RUN_SPEED_THRESHOLD&&!isActiveRun){isActiveRun=true;runStartTime=Date.now()}
  else if(speedKmh<RUN_SPEED_THRESHOLD&&isActiveRun){
    const dur=(Date.now()-runStartTime)/1000
    if(dur>=RUN_MIN_DURATION)sessionRuns++
    isActiveRun=false;runStartTime=null
  }
  updateSessionUI()
}

function onGPSError(err){console.warn('GPS error',err)}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
}

function updateSessionUI(){
  const elapsed=Math.floor((Date.now()-sessionStartTime)/1000)
  const h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60
  const timeStr=`${h?h+':':''}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
  const el=id=>document.getElementById(id)
  if(el('sess-time'))el('sess-time').textContent=timeStr
  if(el('sess-runs'))el('sess-runs').textContent=sessionRuns
  if(el('sess-dist'))el('sess-dist').textContent=sessionDistance.toFixed(2)+' km'
  if(el('sess-speed'))el('sess-speed').textContent=Math.round(currentSpeed)+' km/h'
  if(el('sess-status'))el('sess-status').textContent=isActiveRun?'🟢 Running':'⚪ Idle'
}

async function endSession(){
  if(sessionWatchId!=null){navigator.geolocation.clearWatch(sessionWatchId);sessionWatchId=null}
  if(sessionTimer){clearInterval(sessionTimer);sessionTimer=null}
  if(isActiveRun){const dur=(Date.now()-runStartTime)/1000;if(dur>=RUN_MIN_DURATION)sessionRuns++}
  const elapsed=Math.floor((Date.now()-sessionStartTime)/1000)
  if(activeSession?.id){
    await db.from('sessions').update({ended_at:new Date().toISOString(),runs:sessionRuns,distance_km:parseFloat(sessionDistance.toFixed(2)),duration_seconds:elapsed,top_speed_kmh:parseFloat(sessionTopSpeed.toFixed(1)),route:sessionPositions.slice(0,500)}).eq('id',activeSession.id)
  }
  activeSession=null
  setView('sessions')
}

async function requestPushPermission(){if(!('Notification' in window)||!('serviceWorker' in navigator))return;if(Notification.permission==='granted'){await registerPush();return};if(Notification.permission!=='denied'){const p=await Notification.requestPermission();if(p==='granted')await registerPush()}}
async function registerPush(){try{const swCode=`self.addEventListener('install',e=>self.skipWaiting())\nself.addEventListener('activate',e=>clients.claim())\nself.addEventListener('push',e=>{const d=e.data?.json()||{};e.waitUntil(self.registration.showNotification(d.title||'Stillwater Sports',{body:d.body||'',icon:'/icon.png'}))})\nself.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('/'))})`;const blob=new Blob([swCode],{type:'application/javascript'});const reg=await navigator.serviceWorker.register(URL.createObjectURL(blob));await reg.update();const sub=await reg.pushManager.getSubscription()||await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array('BEl62iUYgUivxIkv69yViEuiBIa40Hi7L8RqJfXFTDJsf3Mu0m5XWMnIyHd1UhXCHx2UE2SXLMlGnQQxMFjvqA')});await db.from('push_subscriptions').upsert({user_id:currentUser.id,subscription:sub},{onConflict:'user_id'})}catch(e){}}
function urlBase64ToUint8Array(b){const p='='.repeat((4-b.length%4)%4);const s=(b+p).replace(/-/g,'+').replace(/_/g,'/');const r=window.atob(s);return Uint8Array.from([...r].map(c=>c.charCodeAt(0)))}
function sendLocalNotification(title,body){if(Notification.permission==='granted')new Notification(title,{body,icon:'/icon.png'})}

function avatarHtml(url,name,size=24){if(url)return`<img src="${url}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:1.5px solid var(--brand)">`;const init=(name||'?')[0].toUpperCase();return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:rgba(0,200,212,0.12);border:1.5px solid var(--brand);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.4)}px;font-weight:700;color:var(--brand)">${init}</div>`}

function showPlatUnlock(sport){
  if(platUnlockSeen[sport])return;platUnlockSeen[sport]=true
  const o=document.createElement('div')
  o.style.cssText='position:fixed;inset:0;background:#1a0a3a;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center'
  o.innerHTML=`<div style="position:absolute;inset:0;background:radial-gradient(circle at center,#5040CC 0%,#1a0a3a 70%);opacity:0"></div><div style="position:relative;z-index:1;text-align:center"><div style="font-size:64px;animation:star-pop .8s .3s cubic-bezier(.34,1.56,.64,1) both">✦</div><div style="font-size:28px;font-weight:800;color:#fff;letter-spacing:.06em;animation:unlock-scale .6s .8s ease both;opacity:0">PLATINUM</div><div style="font-size:14px;color:#b8b0f0;margin-top:8px;animation:unlock-scale .6s 1.1s ease both;opacity:0">unlocked</div><div style="font-size:13px;color:#7B68EE;margin-top:20px;animation:unlock-scale .6s 1.5s ease both;opacity:0">You've mastered the gold tier.<br>The next level awaits.</div></div>`
  document.body.appendChild(o)
  setTimeout(()=>{o.style.transition='opacity .6s';o.style.opacity='0';setTimeout(()=>o.remove(),600)},3200)
  sendLocalNotification('✦ Platinum Unlocked!','You\'ve completed the Gold tier.')
}

function renderNav(){
  const pending=pendingCoach.length
  const tabs=[{id:'skills',label:'Skills'},{id:'training',label:'Training'},{id:'sessions',label:'Sessions'}]
  if(isCoach())tabs.push({id:'coach',label:'Approvals',badge:pending})
  tabs.push({id:'leaderboard',label:'Leaderboard'},{id:'friends',label:'Friends'},{id:'profile',label:'Profile'})
  if(isAdmin())tabs.push({id:'admin',label:'Admin'})
  document.getElementById('nav-tabs').innerHTML=tabs.map(t=>`<button class="nav-tab${activeView===t.id?' active':''}" onclick="setView('${t.id}')" style="position:relative;color:${activeView===t.id?'#fff':'var(--accent)'}">${t.label}${t.badge?`<span style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#E24B4A;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">${t.badge}</span>`:''}</button>`).join('')
}

function renderAvatarTop(){document.getElementById('avatar-top').innerHTML=avatarHtml(userProfile?.avatar_url,userProfile?.name,28)}

async function setView(v){
  activeView=v
  if(v==='coach')await loadCoachQueue()
  if(v==='leaderboard')await loadLeaderboard()
  if(v==='admin')await loadAllUsers()
  if(v==='friends')await loadFriends()
  renderNav()
  const c=document.getElementById('main-content')
  if(v==='skills')renderSkillsView(c)
  else if(v==='training')renderTrainingView(c)
  else if(v==='sessions')renderSessionView(c)
  else if(v==='coach')renderCoachView(c)
  else if(v==='leaderboard')renderLeaderboardView(c)
  else if(v==='friends')renderFriendsView(c)
  else if(v==='profile')renderProfileView(c)
  else if(v==='admin')renderAdminView(c)
}

function renderTrainingView(c){
  const drylandSkills=getDrylandSkills()
  const drylandQuizPassed=hasPassed('dryland')
  const drylandSkillsDone=drylandSkills.every((_,i)=>drylandApprovals[i]?.status==='approved')
  const drylandComplete=drylandQuizPassed&&drylandSkillsDone
  const drylandSkillRows=drylandSkills.map((sk,i)=>{
    const a=drylandApprovals[i],approved=a?.status==='approved',pending=a?.status==='pending',rejected=a?.status==='rejected'
    let cbHtml='',statusHtml=''
    if(approved){cbHtml=`<div class="skill-cb done" style="background:#1D9E75">${chkSVG('#fff')}</div>`}
    else if(pending){cbHtml=`<div class="skill-cb pending-cb">${clockSVG()}</div>`;statusHtml=`<div class="skill-status pending">Awaiting coach approval</div>`}
    else if(rejected){cbHtml=`<div class="skill-cb">${lockSVG()}</div>`;statusHtml=`<div class="skill-status rejected">Rejected — tap to resubmit</div>`}
    else{cbHtml=`<div class="skill-cb"></div>`}
    const clickable=!approved&&drylandQuizPassed
    return`<div class="skill-row${!drylandQuizPassed&&!approved?' locked':''}" onclick="${clickable?`submitDryland(${i})`:''}">
      ${cbHtml}<div class="skill-info"><div class="skill-name">${sk.skill_name}</div>${sk.description?`<div class="skill-desc">${sk.description}</div>`:''}${statusHtml}</div>
    </div>`
  }).join('')
  const driverCards=['driver_beginner','driver_advanced','driver_tournament'].map(qid=>{const q=QUIZZES[qid],passed=hasPassed(qid),result=quizResults[qid];return`<div class="training-card${passed?' completed':''}" onclick="startQuiz('${qid}')"><div class="training-icon">${q.icon}</div><div class="training-title">${q.title}</div><div class="training-desc">${q.desc}</div><span class="training-status ${passed?'pass':'pending-s'}">${passed?`Passed ${result?.score}%`:'Take quiz'}</span></div>`}).join('')
  c.innerHTML=`<div style="margin-bottom:1.5rem"><div class="section-head">Dryland safety — required before water skills</div><div style="background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px"><div style="padding:12px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:13px;font-weight:600">Step 1 — Safety quiz</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Pass the quiz to unlock the skills checklist</div></div>${drylandQuizPassed?`<span style="font-size:11px;font-weight:600;color:#1D9E75;background:rgba(29,158,117,0.1);padding:3px 10px;border-radius:10px">Passed ${quizResults['dryland']?.score}%</span>`:`<button onclick="startQuiz('dryland')" style="padding:6px 14px;border-radius:var(--rsm);border:none;background:var(--brand);color:#fff;font-weight:600;cursor:pointer;font-size:12px">Take quiz</button>`}</div><div style="padding:12px 14px;border-bottom:0.5px solid var(--border)"><div style="font-size:13px;font-weight:600;margin-bottom:4px">Step 2 — Skills checklist</div><div style="font-size:11px;color:var(--muted)">${!drylandQuizPassed?'Complete the quiz first to unlock':'Tap each skill to submit for coach approval'}</div></div><div class="skill-list">${drylandSkillRows||'<div class="empty-state">Loading…</div>'}</div></div>${drylandComplete?`<div style="padding:10px 14px;background:rgba(29,158,117,0.1);border:0.5px solid #1D9E75;border-radius:var(--rsm);font-size:13px;color:#085041;font-weight:500">✓ Dryland complete — water skills unlocked!</div>`:''}</div><div><div class="section-head">Boat driver certification</div><div class="training-grid">${driverCards}</div></div>`

async function submitDryland(idx){
  const existing=drylandApprovals[idx]
  if(existing?.status==='pending'){if(confirm('Cancel this submission?')){await db.from('approvals').delete().match({rider_id:currentUser.id,sport:'dryland',tier:'required',skill_index:idx});delete drylandApprovals[idx];renderTrainingView(document.getElementById('main-content'))};return}
  flashSave()
  const{data,error}=await db.from('approvals').upsert({rider_id:currentUser.id,sport:'dryland',tier:'required',skill_index:idx,status:'pending'},{onConflict:'rider_id,sport,tier,skill_index'}).select().single()
  if(!error&&data)drylandApprovals[idx]=data
  renderTrainingView(document.getElementById('main-content'))
}

    const rows=skills.map((sk,i)=>{
      const approved=isApproved(sp,tier,i),pending=isPending(sp,tier,i),rejected=isRejected(sp,tier,i),lk=!unlocked

  const platRows=platSkills.map((sk,i)=>{

function renderMiniMap(route,id){
  if(!route||route.length<2)return''
  const lats=route.map(p=>p.lat),lngs=route.map(p=>p.lng)
  const minLat=Math.min(...lats),maxLat=Math.max(...lats),minLng=Math.min(...lngs),maxLng=Math.max(...lngs)
  const w=280,h=120,pad=10
  const scaleX=lng=>(lng-minLng)/(maxLng-minLng||0.0001)*(w-pad*2)+pad
  const scaleY=lat=>(1-(lat-minLat)/(maxLat-minLat||0.0001))*(h-pad*2)+pad
  const points=route.map(p=>`${scaleX(p.lng).toFixed(1)},${scaleY(p.lat).toFixed(1)}`).join(' ')
  return`<svg width="100%" viewBox="0 0 ${w} ${h}" style="background:rgba(0,200,212,0.05);border-radius:var(--rsm)">
    <polyline points="${points}" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${scaleX(route[0].lng)}" cy="${scaleY(route[0].lat)}" r="4" fill="#1D9E75"/>
    <circle cx="${scaleX(route[route.length-1].lng)}" cy="${scaleY(route[route.length-1].lat)}" r="4" fill="#D85A30"/>
  </svg>`
}

  else{msg.textContent=result.success;msg.style.color='#1D9E75';document.getElementById('friend-code-inp').value=''}
}

async function reviewSkill(approvalId,status,riderId,sport,tier,skillIdx){
  const note=document.getElementById(`note-${approvalId}`)?.value?.trim()||''
  await db.from('approvals').update({status,note,reviewed_at:new Date().toISOString()}).eq('id',approvalId)
  if(status==='approved'){await db.from('progress').upsert({user_id:riderId,sport,tier,skill_index:skillIdx,status:'approved'},{onConflict:'user_id,sport,tier,skill_index'});if(sport==='dryland')await loadDrylandApprovals()}
  if(note&&sport!=='dryland'){await db.from('skill_notes').insert({rider_id:riderId,coach_id:currentUser.id,sport,tier,skill_index:skillIdx,note})}
  const skillName=sport==='dryland'?(getDrylandSkills()[skillIdx]?.skill_name||'Dryland skill'):(getSkills(sport,tier)[skillIdx]?.skill_name||'skill')
  sendLocalNotification(status==='approved'?'Skill approved!':'Skill needs work',status==='approved'?`${skillName} has been approved`:`${skillName} was not approved${note?': '+note:''}`)
  await loadCoachQueue();renderCoachView(document.getElementById('main-content'));renderNav()
}

function renderLeaderboardView(c){
  const filtered=lbData.filter(r=>r.sport===lbSport)
  const pills=Object.keys(DEFAULT_SKILLS).map(id=>`<button class="lb-pill${id===lbSport?' active':''}" onclick="setLbSport('${id}')">${DEFAULT_SKILLS[id].name}</button>`).join('')
  const rows=filtered.map((r,i)=>`<div class="lb-row"><div class="lb-rank${i<3?' top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div><div class="lb-name">${avatarHtml(r.avatar_url,r.name,24)} ${r.name}</div><div>${tierBadge(r.highest_tier)}</div><div class="lb-score">${r.skills_done} skills</div></div>`).join('')
  c.innerHTML=`<div class="lb-filters">${pills}</div><div class="lb-table"><div class="lb-row header"><div>#</div><div>Rider</div><div>Tier</div><div style="text-align:right">Skills</div></div>${filtered.length?rows:`<div class="empty-state">No riders on the board yet.</div>`}</div>`
}
function setLbSport(id){lbSport=id;renderLeaderboardView(document.getElementById('main-content'))}

function renderProfileView(c){
  const p=userProfile,pushGranted='Notification' in window&&Notification.permission==='granted'
  const certList=Object.keys(DEFAULT_SKILLS).map(id=>{const earned=TIERS.filter(t=>allApproved(id,t));const highest=earned[earned.length-1];if(!highest)return'';return`<div class="profile-row"><span class="profile-key">${DEFAULT_SKILLS[id].name}</span>${tierBadge(highest)}</div>`}).filter(Boolean).join('')
  const driverCerts=Object.values(QUIZZES).filter(q=>q.id!=='dryland'&&hasPassed(q.id)).map(q=>`<div class="profile-row"><span class="profile-key">${q.title}</span><span style="font-size:11px;font-weight:600;color:#1D9E75">Certified ${quizResults[q.id]?.score}%</span></div>`).join('')
  c.innerHTML=`<div class="profile-card"><div class="profile-avatar-wrap">${p?.avatar_url?`<img src="${p.avatar_url}" class="profile-avatar"/>`:`<div class="profile-avatar-ph">${(p?.name||'?')[0].toUpperCase()}</div>`}<label class="btn-upload" style="cursor:pointer">Change photo<input type="file" accept="image/*" style="display:none" onchange="uploadAvatar(this)"/></label></div><div class="profile-row"><span class="profile-key">Name</span><span class="profile-val">${p?.name||'—'}</span></div><div class="profile-row"><span class="profile-key">Email</span><span class="profile-val">${currentUser?.email||'—'}</span></div><div class="profile-row"><span class="profile-key">Role</span><span class="profile-val" style="text-transform:capitalize;color:var(--brand)">${p?.role||'rider'}</span></div><div class="profile-row"><span class="profile-key">Club</span><span class="profile-val" id="club-name-display">Loading…</span></div><div class="profile-row"><span class="profile-key">Safety quiz</span><span class="profile-val" style="color:${hasPassed('dryland')?'#1D9E75':'#D85A30'}">${hasPassed('dryland')?`Passed ${quizResults['dryland']?.score}%`:'Not completed'}</span></div><div class="profile-row"><span class="profile-key">Notifications</span><span class="profile-val" style="color:${pushGranted?'var(--brand)':'var(--muted)'}">${pushGranted?'On':'Off'}</span></div><div class="profile-row" style="cursor:pointer" onclick="showMediaLibrary()"><span class="profile-key">My media library</span><span style="font-size:13px;font-weight:500;color:var(--brand);display:flex;align-items:center;gap:4px">View<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="var(--brand)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div></div>${certList||driverCerts?`<div class="profile-card"><div style="font-size:13px;font-weight:600;margin-bottom:.5rem">Achievements</div>${certList}${driverCerts}</div>`:''}<div class="club-section"><div class="section-head">Join a club</div><div style="font-size:13px;color:var(--muted)">Enter an invite code from your coach.</div><div class="club-join-row"><input id="club-code-inp" placeholder="ABC123" maxlength="6"/><button class="btn-join" onclick="joinClub()">Join</button></div><div id="club-msg" style="font-size:12px;margin-top:8px;min-height:16px"></div></div>`
  loadClubName()
}

async function loadClubName(){const el=document.getElementById('club-name-display');if(!el)return;if(!userProfile?.club_id){el.textContent='No club';return};const{data}=await db.from('clubs').select('name').eq('id',userProfile.club_id).single();if(el)el.textContent=data?.name||'Unknown club'}
async function uploadAvatar(input){const file=input.files[0];if(!file)return;const ext=file.name.split('.').pop();const path=`${currentUser.id}/avatar.${ext}`;const{error}=await db.storage.from('avatars').upload(path,file,{upsert:true});if(error)return alert('Upload failed: '+error.message);const{data}=db.storage.from('avatars').getPublicUrl(path);await db.from('profiles').update({avatar_url:data.publicUrl}).eq('id',currentUser.id);userProfile.avatar_url=data.publicUrl;renderAvatarTop();renderProfileView(document.getElementById('main-content'))}
async function joinClub(){const code=document.getElementById('club-code-inp').value.trim().toUpperCase();const msg=document.getElementById('club-msg');if(!code){msg.textContent='Enter a code';msg.style.color='#D85A30';return};const{data:club}=await db.from('clubs').select('id,name').eq('invite_code',code).single();if(!club){msg.textContent='Club not found — check the code';msg.style.color='#D85A30';return};await db.from('profiles').update({club_id:club.id}).eq('id',currentUser.id);userProfile.club_id=club.id;msg.textContent=`Joined ${club.name}!`;msg.style.color='#1D9E75';loadClubName()}

let adminSubView='users',adminEditSport='waterski',adminEditTier='bronze'

function renderAdminView(c){
  if(!isAdmin()){c.innerHTML=`<div class="empty-state">Admin access only.</div>`;return}
  const riders=allUsers.filter(u=>u.role==='rider').length,coaches=allUsers.filter(u=>u.role==='coach').length
  const subTabs=['users','skills'].map(t=>`<button class="sport-pill${adminSubView===t?' active':''}" onclick="setAdminSub('${t}')" style="margin-bottom:1rem">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')
  if(adminSubView==='users'){
    const rows=allUsers.map(u=>`<div class="user-row"><div style="display:flex;align-items:center;gap:8px">${avatarHtml(u.avatar_url,u.name,22)} ${u.name||u.id.slice(0,8)}</div><select class="role-select" onchange="updateRole('${u.id}',this.value)"><option value="rider" ${u.role==='rider'?'selected':''}>Rider</option><option value="coach" ${u.role==='coach'?'selected':''}>Coach</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select><button class="btn-reset" onclick="resetProgress('${u.id}')">Reset</button></div>`).join('')
    c.innerHTML=`<div class="admin-grid"><div class="admin-stat"><div class="admin-stat-label">Total users</div><div class="admin-stat-val">${allUsers.length}</div></div><div class="admin-stat"><div class="admin-stat-label">Riders</div><div class="admin-stat-val">${riders}</div></div><div class="admin-stat"><div class="admin-stat-label">Coaches</div><div class="admin-stat-val">${coaches}</div></div><div class="admin-stat"><div class="admin-stat-label">Pending approvals</div><div class="admin-stat-val">${pendingCoach.length}</div></div></div><div style="display:flex;gap:6px;margin-bottom:1rem">${subTabs}</div><div class="invite-box"><div class="section-head">Invite user</div><div style="font-size:13px;color:var(--muted)">Creates an account and shows a temporary password to share.</div><div class="invite-row"><input id="invite-email" type="email" placeholder="rider@example.com" onkeydown="if(event.key==='Enter')sendInvite()"/><select id="invite-role"><option value="rider">Rider</option><option value="coach">Coach</option><option value="admin">Admin</option></select><button class="btn-join" onclick="sendInvite()" id="invite-btn">Send invite</button></div><div id="invite-msg" style="font-size:12px;margin-top:8px;min-height:16px"></div></div><div class="section-head" style="margin-bottom:.75rem">Users</div><div class="user-table"><div class="user-row header"><div>Name</div><div>Role</div><div>Actions</div></div>${rows}</div>`
  } else {renderSkillsEditor(c,subTabs)}
}

function renderSkillsEditor(c,subTabs){
  const allSports=[...Object.keys(DEFAULT_SKILLS),'dryland']
  const allTiers=adminEditSport==='dryland'?['required']:[...TIERS,'platinum']
  const sportPills=allSports.map(id=>`<button class="sport-pill${adminEditSport===id?' active':''}" onclick="setAdminSport('${id}')" style="font-size:12px;padding:5px 12px">${id==='dryland'?'Dryland':DEFAULT_SKILLS[id]?.name||id}</button>`).join('')
  const tierPills=allTiers.map(t=>`<button class="sport-pill${adminEditTier===t?' active':''}" onclick="setAdminTier('${t}')" style="font-size:12px;padding:5px 12px">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')
  const skills=adminEditSport==='dryland'?getDrylandSkills():getSkills(adminEditSport,adminEditTier)
  const rows=skills.map((sk,i)=>`<tr id="skill-row-${i}"><td><input class="edit-input" value="${(sk.skill_name||'').replace(/"/g,'&quot;')}" id="sn-${i}" style="min-width:120px"/></td><td><textarea class="edit-textarea" id="sd-${i}" style="min-width:180px">${sk.description||''}</textarea></td><td><textarea class="edit-textarea" id="sc-${i}" style="min-width:180px">${sk.coaching_keys||''}</textarea></td><td><button class="btn-save-skill" onclick="saveSkill('${sk.id}',${i})">Save</button><span class="saved-flash" id="sf-${i}"></span></td></tr>`).join('')
  c.innerHTML=`<div style="display:flex;gap:6px;margin-bottom:1rem">${subTabs}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem">${sportPills}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem">${tierPills}</div><div style="font-size:12px;color:var(--muted);margin-bottom:.75rem">${skills.length} skills — edit inline and click Save</div><div style="overflow-x:auto"><table class="skills-editor-table"><thead><tr><th>Skill name</th><th>Description</th><th style="color:var(--accent)">Coaching keys (coach/admin only)</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="4" style="text-align:center;padding:1rem;color:var(--muted)">No skills in this tier yet</td></tr>'}</tbody></table></div>`
}

async function saveSkill(skillId,idx){
  const name=document.getElementById(`sn-${idx}`)?.value?.trim()
  const desc=document.getElementById(`sd-${idx}`)?.value?.trim()
  const keys=document.getElementById(`sc-${idx}`)?.value?.trim()
  const btn=document.querySelector(`#skill-row-${idx} .btn-save-skill`)
  if(btn)btn.disabled=true
  await db.from('skills').update({skill_name:name,description:desc,coaching_keys:keys}).eq('id',skillId)
  await loadDbSkills()
  const flash=document.getElementById(`sf-${idx}`)
  if(flash){flash.textContent='Saved!';setTimeout(()=>flash.textContent='',2000)}
  if(btn)btn.disabled=false
}

function setAdminSub(v){adminSubView=v;renderAdminView(document.getElementById('main-content'))}
function setAdminSport(id){adminEditSport=id;adminEditTier=id==='dryland'?'required':'bronze';renderAdminView(document.getElementById('main-content'))}
function setAdminTier(t){adminEditTier=t;renderAdminView(document.getElementById('main-content'))}

async function sendInvite(){
  const email=document.getElementById('invite-email').value.trim()
  const role=document.getElementById('invite-role').value
  const msg=document.getElementById('invite-msg')
  const btn=document.getElementById('invite-btn')
  if(!email){msg.textContent='Enter an email address';msg.style.color='#D85A30';return}
  btn.disabled=true;btn.textContent='Creating…';msg.textContent=''
  const tempPass=Math.random().toString(36).slice(2)+'A1!'
  const{data,error}=await db.auth.signUp({email,password:tempPass})
  if(error){msg.textContent=error.message;msg.style.color='#D85A30';btn.disabled=false;btn.textContent='Send invite';return}
  if(data?.user?.id)await db.from('profiles').upsert({id:data.user.id,name:email.split('@')[0],role})
  msg.textContent=`Account created! Temp password: ${tempPass}`;msg.style.color='#1D9E75'
  document.getElementById('invite-email').value=''
  btn.disabled=false;btn.textContent='Send invite'
  await loadAllUsers();renderAdminView(document.getElementById('main-content'))
}

async function updateRole(userId,role){await db.from('profiles').update({role}).eq('id',userId);const u=allUsers.find(u=>u.id===userId);if(u)u.role=role}
async function resetProgress(userId){if(!confirm('Reset all progress for this user?'))return;await db.from('approvals').delete().eq('rider_id',userId);await db.from('progress').delete().eq('user_id',userId);await db.from('quiz_results').delete().eq('user_id',userId);alert('Progress reset.')}

checkSharePage().then(isShare=>{
  if(isShare)return
  db.auth.getSession().then(({data:{session}})=>{if(session?.user)loadUser(session.user)})
  db.auth.onAuthStateChange((_,session)=>{if(!session&&currentUser)signOut()})
})
</script>
