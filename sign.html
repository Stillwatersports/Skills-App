// ---------- signature widget ----------
function sigWidget(fieldName, label){
  return `<label>${esc(label)}</label>
  <div class="sig-tabs">
    <button type="button" class="sig-tab active" data-sig="${fieldName}" data-mode="type">Type</button>
    <button type="button" class="sig-tab" data-sig="${fieldName}" data-mode="draw">Draw</button>
  </div>
  <div class="sig-pane active" id="${fieldName}-type">
    <input type="text" id="${fieldName}-typed" placeholder="Type your full name" oninput="document.getElementById('${fieldName}-preview').textContent=this.value"/>
    <div class="typed-sig" id="${fieldName}-preview" style="margin-top:8px;color:var(--text)"></div>
  </div>
  <div class="sig-pane" id="${fieldName}-draw">
    <canvas class="sigpad" id="${fieldName}-canvas"></canvas>
    <button type="button" class="sig-clear" data-clear="${fieldName}">Clear</button>
  </div>`;
}
function initSigPad(fieldName){
  const canvas=el(fieldName+'-canvas'); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;ctx.lineWidth=2.2;ctx.lineCap='round';ctx.strokeStyle='#0a2a2a';}
  resize(); window.addEventListener('resize',resize);
  let drawing=false,empty=true;
  function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  function start(e){drawing=true;empty=false;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();}
  function move(e){if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault();}
  function end(){drawing=false;}
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
  sigPads[fieldName]={mode:'type',canvas,isEmpty:()=>empty,clear:()=>{ctx.clearRect(0,0,canvas.width,canvas.height);empty=true;},getData:()=>canvas.toDataURL('image/png')};
}

function mediaBlock(prefix){ // prefix 'adult' or 'minor'
  return `<h2>Media Release <span class="muted" style="font-weight:600">(optional)</span></h2>
  <p class="muted">Separate and optional — your waiver is valid whether or not you grant this. Refusal has no effect on participation.</p>
  <div class="media-opt" id="${prefix}-media-yes-opt"><label style="margin:0"><input type="radio" name="${prefix}_media" value="yes" style="width:auto;margin-right:8px"/>YES — I grant media consent (images/video may be used for website &amp; social media marketing)</label></div>
  <div class="media-opt" id="${prefix}-media-no-opt"><label style="margin:0"><input type="radio" name="${prefix}_media" value="no" style="width:auto;margin-right:8px"/>NO — I do not grant media consent</label></div>
  <div id="${prefix}-media-extra" class="hide">
    <div class="grid2">
      <div><label>Name(s) this applies to</label><input type="text" id="${prefix}_media_names"/></div>
      <div><label>Initials</label><input type="text" id="${prefix}_media_initials"/></div>
    </div>
    <label>Additional restrictions (e.g. no faces, no names)</label>
    <input type="text" id="${prefix}_media_restrictions"/>
  </div>`;
}
function wireMedia(prefix){
  document.querySelectorAll('input[name="'+prefix+'_media"]').forEach(r=>{
    r.addEventListener('change',()=>{
      el(prefix+'-media-yes-opt').classList.toggle('sel', r.value==='yes' && r.checked);
      el(prefix+'-media-no-opt').classList.toggle('sel', r.value==='no' && r.checked);
      // show extra fields only when YES
      const yes=document.querySelector('input[name="'+prefix+'_media"][value=yes]');
      el(prefix+'-media-extra').classList.toggle('hide', !(yes&&yes.checked));
    });
  });
}

function render(){

  el('fields-card').innerHTML = fields + consentBlock();
  // init signature pads + tabs
  Object.keys(sigPads).forEach(k=>delete sigPads[k]);
  document.querySelectorAll('canvas.sigpad').forEach(c=>initSigPad(c.id.replace('-canvas','')));
  document.querySelectorAll('.sig-tab').forEach(t=>t.addEventListener('click',()=>{
    const f=t.dataset.sig,m=t.dataset.mode;
    document.querySelectorAll('.sig-tab[data-sig="'+f+'"]').forEach(x=>x.classList.toggle('active',x.dataset.mode===m));
    el(f+'-type').classList.toggle('active',m==='type');

  }));

  if(WAIVER.waiver_type==='minor') wireMedia('minor');
}

// collect a signature: returns {text, dataUrl}
function collectSig(field){
  const pad=sigPads[field]; const mode=pad?pad.mode:'type';
  if(mode==='draw' && pad && !pad.isEmpty()) return {dataUrl:pad.getData()};
  const typed=el(field+'-typed'); return {text:typed?typed.value.trim():''};
}
function val(id){const e=el(id);return e?e.value.trim():'';}
function showErr(m){const x=el('form-msg');x.textContent=m;x.className='msg err';window.scrollTo({top:0,behavior:'smooth'});}

async function submit(){
  const btn=el('submitBtn');
  // consent required
  if(!el('consent_terms').checked || !el('consent_esign').checked){return showErr('Please tick both consent boxes to continue.');}
  const form={}; const sigs={};
  let isGuardian=false, primarySig=null, mediaPrefix=null;

  if(WAIVER.waiver_type==='adult'){
    form.p1_name=val('p1_name'); form.p1_date=todayMDY();
    if(!form.p1_name) return showErr('Please enter the participant name.');
    primarySig=collectSig('p1_sig');
    if(primarySig.dataUrl) sigs.p1_sig=primarySig.dataUrl; else form.p1_sig=primarySig.text;
    if(!primarySig.dataUrl && !primarySig.text) return showErr('Please add your signature.');
    ['p2','p3'].forEach(p=>{const n=val(p+'_name'); if(n){form[p+'_name']=n; const s=collectSig(p+'_sig'); if(s.dataUrl)sigs[p+'_sig']=s.dataUrl; else if(s.text)form[p+'_sig']=s.text;}});
    mediaPrefix='adult';
  } else if(WAIVER.waiver_type==='minor'){
    isGuardian=true;
    form.minor_name=val('minor_name'); form.minor_dob=val('minor_dob'); form.minor_age=val('minor_age');
    if(!form.minor_name) return showErr('Please enter the minor participant name.');
    if(!el('ack_paras').checked) return showErr('Please confirm you have read paragraphs 1–3.');
    form.ack_We_have_re=true;
    form.guardian_name=val('guardian_name'); form.guardian_date=todayMDY();
    if(!form.guardian_name) return showErr('Please enter the parent / guardian name.');
    const gs=collectSig('guardian_sig');
    if(gs.dataUrl) sigs.guardian_sig=gs.dataUrl; else form.guardian_sig=gs.text;
    if(!gs.dataUrl && !gs.text) return showErr('Parent / guardian signature is required.');
    const ms=collectSig('minor_sig_optional'); if(ms.dataUrl){sigs.minor_sig_optional=ms.dataUrl;form.minor_sig_date=todayMDY();} else if(ms.text){form.minor_sig_optional=ms.text;form.minor_sig_date=todayMDY();}
    mediaPrefix='minor';
  } else { // parental_consent
    isGuardian=true;
    ['minor_full_name','minor_dob','minor_age','minor_address','minor_city','minor_prov','guardian_full_name','guardian_relationship','guardian_phone','guardian_email','guardian_city','supervisor_name','supervisor_rel','supervisor_phone','session_date','session_location','session_package','emerg_name','emerg_rel','emerg_phone','medical_notes'].forEach(id=>{const v=val(id); if(v)form[id]=v;});
    if(!form.minor_full_name) return showErr("Please enter the minor's full name.");
    if(!form.guardian_full_name) return showErr('Please enter the parent / guardian name.');
    form.consent_guardian_name=val('consent_guardian_name')||form.guardian_full_name; form.consent_date=todayMDY();
    const cs=collectSig('consent_guardian_sig');
    if(cs.dataUrl) sigs.consent_guardian_sig=cs.dataUrl; else form.consent_guardian_sig=cs.text;
    if(!cs.dataUrl && !cs.text) return showErr('Parent / guardian signature is required.');
  }

  // media release (adult/minor only)
  let media_consent=null, media_restrictions=null;
  if(mediaPrefix){
    const sel=document.querySelector('input[name="'+mediaPrefix+'_media"]:checked');
    if(sel){
      media_consent=sel.value;
      form[mediaPrefix+'_media_'+(sel.value==='yes'?'grant':'deny')]='Yes';
      form[mediaPrefix+'_media_date']=todayMDY();
      if(sel.value==='yes'){
        const nm=val(mediaPrefix+'_media_names'), ini=val(mediaPrefix+'_media_initials'), rstr=val(mediaPrefix+'_media_restrictions');
        if(nm)form[mediaPrefix+'_media_names']=nm; if(ini)form[mediaPrefix+'_media_initials']=ini;
        if(rstr){form[mediaPrefix+'_media_restrictions']=rstr; media_restrictions=rstr;}
      }
    }
  }
  if(Object.keys(sigs).length) form._signatures=sigs;

  const signer_name = form.p1_name || form.guardian_name || form.consent_guardian_name || WAIVER.signer_name || null;
  const signer_email = WAIVER.signer_email || form.guardian_email || null;

  btn.disabled=true; btn.textContent='Submitting…';
  const {error}=await db.rpc('submit_waiver',{p_token:TOKEN,p_payload:{
    form_data:form, consent_esign:true, consent_terms:true,
    signer_name, signer_email, is_guardian_signature:isGuardian,
    media_consent, media_restrictions
  }});
  if(error){btn.disabled=false;btn.textContent='Sign & submit';return showErr(error.message||'Something went wrong. Please try again.');}
  el('app').classList.add('hide'); el('done').classList.remove('hide');
  if(signer_email) el('done-msg').textContent='Your signed waiver has been recorded. A copy is on its way to '+signer_email+'.';
}

async function init(){
  if(!TOKEN){return showGate('This link is missing its access code.');}
  const {data,error}=await db.rpc('get_waiver_for_signing',{p_token:TOKEN});
  if(error){return showGate(error.message||'This link could not be opened.');}
  WAIVER=data; render();
  el('submitBtn').addEventListener('click',submit);
}
init();
</script>
</body>
</html>
